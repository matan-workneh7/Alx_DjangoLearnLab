{% extends 'base.html' %}
{% load static %}

{% block title %}Delete Comment - Django Blog{% endblock %}

{% block content %}
<div class="form-container">
    <h2 class="form-title">Delete Comment</h2>
    <div class="alert alert-warning">
        <h3>Are you sure you want to delete this comment?</h3>
        <p>This action cannot be undone.</p>
        <blockquote>{{ object.content|truncatewords:30 }}</blockquote>
    </div>
    
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <button type="submit" class="btn btn-danger">Yes, Delete Comment</button>
            <a href="{% url 'post_detail' object.post.pk %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
